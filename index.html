const headers = {
  "Content-Type": "application/json",
  "apikey": SUPA_KEY,
  "Authorization": "Bearer " + SUPA_KEY,
  "Prefer": "return=minimal"
};

async function cargarDatos() {
  try {
    const res = await fetch(SUPA_URL + "/rest/v1/enkki_datos?id=eq.main&select=productos,ventas", { headers });
    const json = await res.json();
    if (json && json[0] && json[0].productos && json[0].productos.length > 0) {
      const saved = { productos: json[0].productos, ventas: json[0].ventas || [] };
      // Sincronizar costos precargados
      saved.productos = saved.productos.map(p => {
        const ini = PRODUCTOS_INICIALES.find(x => x.id === p.id);
        if (!ini || ini.mats.length === 0) return p;
        const matsUsuario = p.mats.filter(m => m.id > 100000);
        return { ...p, mats: [...ini.mats, ...matsUsuario] };
      });
      return saved;
    }
  } catch(e) { console.log("Error Supabase:", e); }
  return { productos: PRODUCTOS_INICIALES, ventas: [] };
}

async function guardarDatos(data) {
  try {
    await fetch(SUPA_URL + "/rest/v1/enkki_datos?id=eq.main", {
      method: "PATCH",
      headers,
      body: JSON.stringify({ productos: data.productos, ventas: data.ventas, updated_at: new Date().toISOString() })
    });
    // Si no existe aún, crear
    const res = await fetch(SUPA_URL + "/rest/v1/enkki_datos?id=eq.main&select=id", { headers });
    const rows = await res.json();
    if (!rows || rows.length === 0) {
      await fetch(SUPA_URL + "/rest/v1/enkki_datos", {
        method: "POST",
        headers: { ...headers, "Prefer": "return=minimal" },
        body: JSON.stringify({ id: "main", productos: data.productos, ventas: data.ventas })
      });
    }
  } catch(e) { console.log("Error guardando:", e); }
}

// ── TAB STOCK ────────────────────────────────────────────────────────────────
function TabStock({ data, setData, guardar }) {
  const [cat, setCat] = useState("Pantallas");
  const [q, setQ] = useState("");
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({});

  const lista = data.productos.filter(p =>
    (q ? p.nombre.toLowerCase().includes(q.toLowerCase()) || p.id.includes(q) : p.cat === cat)
  );

  const totalStock = data.productos.reduce((s, p) => s + p.stock * p.pMen, 0);

  function abrirEdit(p) { setEdit(p.id); setForm({ stock: p.stock, pMay: p.pMay, pMen: p.pMen }); }

  function guardarEdit() {
    const np = data.productos.map(p => p.id === edit ? { ...p, stock: +form.stock, pMay: +form.pMay, pMen: +form.pMen } : p);
    const nd = { ...data, productos: np };
    setData(nd); guardar(nd); setEdit(null);
  }

  return (
    <div>
      {/* Banner total */}
      <div style={{ background:"linear-gradient(135deg,#2a1c08,#1a1a1a)", border:"1px solid #c9a84c22", borderRadius:14, padding:"14px 18px", marginBottom:14 }}>
        <div style={{ color:GOLD, fontSize:10, letterSpacing:2 }}>VALOR TOTAL STOCK (MINORISTA)</div>
        <div style={{ color:"#f0e0c0", fontSize:24, fontFamily:"Georgia,serif", fontWeight:700, marginTop:3 }}>{fmt(totalStock)}</div>
      </div>

      {/* Buscar */}
      <input value={q} onChange={e => setQ(e.target.value)} placeholder="🔍  Buscar por nombre o código..." style={{ ...S.input, marginBottom:12 }} />

      {/* Cats */}
      {!q && (
        <div style={{ display:"flex", gap:7, overflowX:"auto", paddingBottom:8, marginBottom:12 }}>
          {CATS.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{ flexShrink:0, padding:"5px 13px", borderRadius:18, border:"none", cursor:"pointer", fontSize:12, fontWeight:600, background: cat===c ? GOLD : "#222", color: cat===c ? "#111" : "#666" }}>{c}</button>
          ))}
        </div>
      )}

      {/* Lista */}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {lista.map(p => {
          const alerta = p.stock === 0;
          const bajo = p.stock > 0 && p.stock <= 5;
          return (
            <div key={p.id} style={{ ...S.card, borderColor: alerta ? "#c0392b33" : bajo ? "#c9a84c33" : "#2a2a2a", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                  <span style={{ background:"#2a2a2a", color:GOLD, fontSize:10, padding:"2px 7px", borderRadius:5, fontWeight:700 }}>{p.id}</span>
                  {alerta && <span style={{ background:"#c0392b22", color:"#e74c3c", fontSize:9, padding:"2px 6px", borderRadius:4 }}>SIN STOCK</span>}
                  {bajo && <span style={{ background:"#c9a84c22", color:GOLD, fontSize:9, padding:"2px 6px", borderRadius:4 }}>POCO</span>}
                </div>
                <div style={{ color:"#f0e0c0", fontSize:14, fontWeight:600, marginBottom:3 }}>{p.nombre}</div>
                <div style={{ fontSize:12, color:"#666" }}>May: <span style={{ color:"#aaa" }}>{fmt(p.pMay)}</span> &nbsp; Men: <span style={{ color:GOLD }}>{fmt(p.pMen)}</span></div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginLeft:10 }}>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:22, fontWeight:800, color: alerta ? "#e74c3c" : bajo ? GOLD : "#f0e0c0", fontFamily:"Georgia,serif" }}>{p.stock}</div>
                  <div style={{ fontSize:9, color:"#444", textTransform:"uppercase" }}>uds</div>
                </div>
                <button onClick={() => abrirEdit(p)} style={{ background:"#2a2a2a", border:"none", borderRadius:8, padding:"8px 9px", color:GOLD, cursor:"pointer", fontSize:14 }}>✏️</button>

      {edit && (() => {
        const p = data.productos.find(x => x.id === edit);

          <Modal title={`${p.id} — ${p.nombre}`} onClose={() => setEdit(null)}>

        );

  );
}

function TabVender({ data, setData, guardar }) {
  const [q, setQ] = useState("");
  const [carrito, setCarrito] = useState([]);
  const [canal, setCanal] = useState("men");
  const [confirmando, setConfirmando] = useState(false);
  const [ok, setOk] = useState(false);

  const sugerencias = q.length >= 2 ? data.productos.filter(p =>
    p.nombre.toLowerCase().includes(q.toLowerCase()) || p.id.includes(q)
  ).slice(0, 5) : [];

  function agregar(p) {
    setQ("");
    setCarrito(prev => {
      const ex = prev.find(c => c.id === p.id);
      return ex ? prev.map(c => c.id === p.id ? { ...c, qty: c.qty + 1 } : c) : [...prev, { ...p, qty: 1 }];
    });
  }

  function qty(id, d) { setCarrito(prev => prev.map(c => c.id === id ? { ...c, qty: Math.max(0, c.qty + d) } : c).filter(c => c.qty > 0)); }

  const total = carrito.reduce((s, c) => s + c.qty * (canal === "men" ? c.pMen : c.pMay), 0);

  function confirmar() {
    const venta = {
      id: Date.now(),
      fecha: new Date().toLocaleDateString("es-AR"),
      hora: new Date().toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" }),
      canal,
      items: carrito.map(c => ({ id:c.id, nombre:c.nombre, qty:c.qty, precio: canal === "men" ? c.pMen : c.pMay })),
      total,
    };
    const np = data.productos.map(p => {
      const item = carrito.find(c => c.id === p.id);
      return item ? { ...p, stock: Math.max(0, p.stock - item.qty) } : p;
    });
    const nd = { ...data, productos: np, ventas: [venta, ...data.ventas] };
    setData(nd); guardar(nd); setCarrito([]); setConfirmando(false);
    setOk(true); setTimeout(() => setOk(false), 3000);
  }

  function generarWhatsApp() {
    const fecha = new Date().toLocaleDateString("es-AR");
    const canalTexto = canal === "men" ? "Minorista" : "Mayorista";
    let msg = "";
    msg += "✨ *ENKKI* — Iluminación & Decoración\n";
    msg += "━━━━━━━━━━━━━━━━━━\n\n";
    msg += `📋 *Presupuesto ${canalTexto}*\n`;
    msg += `📅 ${fecha}\n\n`;
    msg += "*Detalle del pedido:*\n";
    carrito.forEach(c => {
      const precio = canal === "men" ? c.pMen : c.pMay;
      msg += `• ${c.qty}× ${c.nombre} — $${(precio * c.qty).toLocaleString("es-AR")}\n`;
    });
    msg += "\n━━━━━━━━━━━━━━━━━━\n";
    msg += `💰 *TOTAL: $${total.toLocaleString("es-AR")}*\n`;
    msg += "━━━━━━━━━━━━━━━━━━\n\n";
    msg += "🔦 Fabricación artesanal en chapa y vidrio\n";
    msg += "📱 3415824371\n";
    msg += "🌐 enkki-catalogo.netlify.app\n\n";
    msg += "_La antítesis del plástico_ 🖤";
    const url = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
  }

  return (
    <div>
      {ok && <div style={{ background:"#1a3a1a", border:"1px solid #27ae60", borderRadius:10, padding:"11px 14px", marginBottom:14, color:"#27ae60", fontWeight:600, fontSize:14 }}>✓ Venta registrada — stock actualizado</div>}

      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[["men","🏠 Minorista"],["may","📦 Mayorista"]].map(([v, lb]) => (
          <button key={v} onClick={() => setCanal(v)} style={{ flex:1, padding:"10px", borderRadius:10, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background: canal===v ? GOLD : "#222", color: canal===v ? "#111" : "#666" }}>{lb}</button>
        ))}
      </div>

      <div style={{ position:"relative", marginBottom:14 }}>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar producto para agregar..." style={S.input} />
        {sugerencias.length > 0 && (
          <div style={{ position:"absolute", top:"105%", left:0, right:0, background:"#1e1e1e", border:"1px solid #333", borderRadius:10, zIndex:10, overflow:"hidden" }}>
            {sugerencias.map(p => (
              <button key={p.id} onClick={() => agregar(p)} style={{ width:"100%", background:"transparent", border:"none", borderBottom:"1px solid #2a2a2a", padding:"10px 13px", color:"#f0e0c0", cursor:"pointer", textAlign:"left", display:"flex", justifyContent:"space-between" }}>
                <span><span style={{ color:GOLD, fontSize:11, marginRight:6 }}>{p.id}</span>{p.nombre}</span>
                <span style={{ color:"#555", fontSize:12 }}>stock: {p.stock}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {carrito.length === 0 ? (
        <div style={{ textAlign:"center", color:"#444", padding:"50px 0", fontSize:14 }}>Buscá un producto para empezar la venta</div>
      ) : (
        <>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
            {carrito.map(c => {
              const precio = canal === "men" ? c.pMen : c.pMay;
              const stockReal = data.productos.find(p => p.id === c.id)?.stock ?? 0;
              const sinStock = c.qty > stockReal;
              return (
                <div key={c.id} style={{ ...S.card, borderColor: sinStock ? "#c0392b44" : "#2a2a2a" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div><span style={{ color:GOLD, fontSize:11 }}>{c.id}</span> <span style={{ color:"#f0e0c0", fontSize:14, fontWeight:600 }}>{c.nombre}</span></div>
                    <span style={{ color:GOLD, fontWeight:700 }}>{fmt(precio * c.qty)}</span>
                  </div>
                  {sinStock && <div style={{ color:"#e74c3c", fontSize:11, marginTop:3 }}>⚠ Stock insuficiente (hay {stockReal})</div>}
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:9 }}>
                    <button onClick={() => qty(c.id, -1)} style={{ background:"#2a2a2a", border:"none", borderRadius:7, width:30, height:30, color:"#f0e0c0", fontSize:18, cursor:"pointer" }}>−</button>
                    <span style={{ color:"#f0e0c0", fontWeight:700, minWidth:28, textAlign:"center" }}>{c.qty}</span>
                    <button onClick={() => qty(c.id, 1)} style={{ background:"#2a2a2a", border:"none", borderRadius:7, width:30, height:30, color:"#f0e0c0", fontSize:18, cursor:"pointer" }}>+</button>
                    <span style={{ color:"#555", fontSize:12 }}>{fmt(precio)} c/u</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ background:"#1e1407", border:"1px solid #c9a84c33", borderRadius:12, padding:"13px 16px", marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:"#888" }}>Total {canal === "men" ? "minorista" : "mayorista"}</span>
            <span style={{ color:GOLD, fontSize:22, fontWeight:700, fontFamily:"Georgia,serif" }}>{fmt(total)}</span>
          </div>

          <div style={{ display:"flex", gap:10, marginBottom:10 }}>
            <button onClick={() => setCarrito([])} style={{ ...S.btnDark, flex:1 }}>Cancelar</button>
            <button onClick={() => setConfirmando(true)} style={{ ...S.btnGold, flex:2 }}>Registrar venta</button>
          </div>
          <button onClick={generarWhatsApp} style={{ width:"100%", background:"#1a3a1a", color:"#25d366", border:"1px solid #25d36644", borderRadius:11, padding:"13px", fontSize:15, fontWeight:700, cursor:"pointer" }}>
            💬 Enviar presupuesto por WhatsApp
          </button>
        </>
      )}

      {confirmando && (
        <Modal title="Confirmar venta" onClose={() => setConfirmando(false)}>
          <p style={{ color:"#888", fontSize:14, marginBottom:14 }}>
            {carrito.reduce((s,c)=>s+c.qty,0)} productos · <strong style={{ color:GOLD }}>{fmt(total)}</strong> · El stock se descuenta automáticamente.
          </p>
          {carrito.map(c => (
            <div key={c.id} style={{ display:"flex", justifyContent:"space-between", color:"#aaa", fontSize:13, marginBottom:5 }}>
              <span>{c.qty}× {c.nombre}</span>
              <span>{fmt((canal==="men"?c.pMen:c.pMay)*c.qty)}</span>
            </div>
          ))}
          <button onClick={confirmar} style={{ ...S.btnGold, marginTop:18 }}>✓ Confirmar y descontar stock</button>
        </Modal>
      )}
    </div>
  );
}

// ── TAB COSTOS ───────────────────────────────────────────────────────────────
function TabCostos({ data, setData, guardar }) {
  const [sel, setSel] = useState(null);
  const [q, setQ] = useState("");
  const [mat, setMat] = useState({ nombre:"", qty:"", unidad:"", costo:"" });

  const lista = data.productos.filter(p =>
    q ? p.nombre.toLowerCase().includes(q.toLowerCase()) || p.id.includes(q) : true
  );

  const prod = sel ? data.productos.find(p => p.id === sel) : null;
  const costoTotal = prod ? prod.mats.reduce((s, m) => s + m.qty * m.costo, 0) : 0;

  function agregarMat() {
    if (!mat.nombre || !mat.costo) return;
    const np = data.productos.map(p => p.id !== sel ? p : { ...p, mats: [...p.mats, { ...mat, id: Date.now(), qty: +mat.qty || 1, costo: +mat.costo }] });
    const nd = { ...data, productos: np }; setData(nd); guardar(nd);
    setMat({ nombre:"", qty:"", unidad:"", costo:"" });
  }

  function eliminarMat(mid) {
    const np = data.productos.map(p => p.id !== sel ? p : { ...p, mats: p.mats.filter(m => m.id !== mid) });
    const nd = { ...data, productos: np }; setData(nd); guardar(nd);
  }

  if (sel && prod) {
    const mMen = costoTotal > 0 ? ((prod.pMen - costoTotal) / prod.pMen * 100).toFixed(0) : "—";
    const mMay = costoTotal > 0 ? ((prod.pMay - costoTotal) / prod.pMay * 100).toFixed(0) : "—";
    return (
      <div>
        <button onClick={() => setSel(null)} style={{ background:"#222", border:"none", borderRadius:8, padding:"7px 14px", color:GOLD, cursor:"pointer", marginBottom:14, fontSize:13 }}>← Volver</button>
        <div style={{ ...S.card, marginBottom:14 }}>
          <div style={{ color:GOLD, fontSize:11 }}>{prod.id}</div>
          <div style={{ color:"#f0e0c0", fontSize:17, fontWeight:700, fontFamily:"Georgia,serif", marginTop:2 }}>{prod.nombre}</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
          {[["Costo",fmt(costoTotal),"#e74c3c"],["Margen Men",mMen+"%","#27ae60"],["Margen May",mMay+"%","#3498db"]].map(([lb,v,c])=>(
            <div key={lb} style={{ ...S.card, textAlign:"center" }}>
              <div style={{ color:c, fontSize:14, fontWeight:700 }}>{v}</div>
              <div style={{ color:"#555", fontSize:10, marginTop:2 }}>{lb}</div>
            </div>
          ))}
        </div>
        <div style={{ color:"#555", fontSize:11, letterSpacing:1, marginBottom:8 }}>MATERIALES</div>
        {prod.mats.length === 0 ? (
          <div style={{ color:"#444", fontSize:13, textAlign:"center", padding:24 }}>Sin materiales cargados aún</div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:14 }}>
            {prod.mats.map(m => (
              <div key={m.id} style={{ ...S.card, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ color:"#f0e0c0", fontSize:13, fontWeight:600 }}>{m.nombre}</div>
                  <div style={{ color:"#555", fontSize:11 }}>{m.qty} {m.unidad} × {fmt(m.costo)}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ color:GOLD, fontWeight:700 }}>{fmt(m.qty*m.costo)}</span>
                  <button onClick={() => eliminarMat(m.id)} style={{ background:"#2a2a2a", border:"none", borderRadius:6, padding:"5px 8px", color:"#e74c3c", cursor:"pointer" }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{ ...S.card, borderColor:"#c9a84c22" }}>
          <div style={{ color:"#666", fontSize:11, letterSpacing:1, marginBottom:10 }}>+ NUEVO MATERIAL</div>
          <input placeholder="Nombre (ej: Chapa 0.8mm)" value={mat.nombre} onChange={e => setMat(f=>({...f,nombre:e.target.value}))} style={{ ...S.input, marginBottom:8 }} />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:7, marginBottom:10 }}>
            <input placeholder="Cant." type="number" value={mat.qty} onChange={e => setMat(f=>({...f,qty:e.target.value}))} style={{ ...S.input }} />
            <input placeholder="Unidad" value={mat.unidad} onChange={e => setMat(f=>({...f,unidad:e.target.value}))} style={{ ...S.input }} />
            <input placeholder="$ costo" type="number" value={mat.costo} onChange={e => setMat(f=>({...f,costo:e.target.value}))} style={{ ...S.input }} />
          </div>
          <button onClick={agregarMat} style={S.btnGold}>Agregar material</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <input value={q} onChange={e => setQ(e.target.value)} placeholder="🔍  Buscar producto..." style={{ ...S.input, marginBottom:12 }} />
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {lista.map(p => {
          const costo = p.mats.reduce((s,m)=>s+m.qty*m.costo,0);
          const margen = costo > 0 ? ((p.pMen-costo)/p.pMen*100).toFixed(0) : null;
          return (
            <button key={p.id} onClick={() => setSel(p.id)} style={{ ...S.card, border:"1px solid #2a2a2a", textAlign:"left", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <span style={{ color:GOLD, fontSize:10, marginRight:6 }}>{p.id}</span>
                <span style={{ color:"#f0e0c0", fontSize:14, fontWeight:600 }}>{p.nombre}</span>
                <div style={{ color:"#555", fontSize:12, marginTop:2 }}>{p.mats.length} materiales</div>
              </div>
              <div style={{ textAlign:"right" }}>
                {costo > 0 ? <>
                  <div style={{ color:"#e74c3c", fontSize:13, fontWeight:600 }}>{fmt(costo)}</div>
                  <div style={{ color:"#27ae60", fontSize:11 }}>margen {margen}%</div>
                </> : <div style={{ color:"#333", fontSize:12 }}>Sin costo</div>}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── TAB HISTORIAL ─────────────────────────────────────────────────────────────
function TabHistorial({ data, setData, guardar }) {
  const total = data.ventas.reduce((s,v)=>s+v.total,0);

  function eliminar(id) {
    const nd = { ...data, ventas: data.ventas.filter(v=>v.id!==id) };
    setData(nd); guardar(nd);
  }

  if (!data.ventas.length) return (
    <div style={{ textAlign:"center", color:"#444", padding:"60px 0", fontSize:14 }}>
      Aún no hay ventas registradas.<br/><span style={{ color:"#333" }}>Aparecerán acá cuando vendas.</span>
    </div>
  );

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ ...S.card, textAlign:"center" }}>
          <div style={{ color:GOLD, fontSize:19, fontWeight:700, fontFamily:"Georgia,serif" }}>{fmt(total)}</div>
          <div style={{ color:"#555", fontSize:10, marginTop:2 }}>TOTAL FACTURADO</div>
        </div>
        <div style={{ ...S.card, textAlign:"center" }}>
          <div style={{ color:"#f0e0c0", fontSize:19, fontWeight:700, fontFamily:"Georgia,serif" }}>{data.ventas.length}</div>
          <div style={{ color:"#555", fontSize:10, marginTop:2 }}>VENTAS</div>
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {data.ventas.map(v => (
          <div key={v.id} style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div>
                <span style={{ color:"#f0e0c0", fontSize:13, fontWeight:600 }}>{v.fecha}</span>
                <span style={{ color:"#555", fontSize:12, marginLeft:7 }}>{v.hora}</span>
                <span style={{ background: v.canal==="men" ? "#c9a84c22" : "#3498db22", color: v.canal==="men" ? GOLD : "#3498db", fontSize:10, padding:"2px 7px", borderRadius:5, marginLeft:7, textTransform:"uppercase" }}>{v.canal==="men"?"Minorista":"Mayorista"}</span>
              </div>
              <button onClick={() => eliminar(v.id)} style={{ background:"#2a2a2a", border:"none", borderRadius:6, padding:"4px 8px", color:"#555", cursor:"pointer" }}>✕</button>
            </div>
            {v.items.map((it,i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", color:"#777", fontSize:12, marginBottom:3 }}>
                <span>{it.qty}× {it.nombre}</span><span>{fmt(it.precio*it.qty)}</span>
              </div>
            ))}
            <div style={{ borderTop:"1px solid #2a2a2a", marginTop:8, paddingTop:8, display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"#666", fontSize:13 }}>Total</span>
              <span style={{ color:GOLD, fontWeight:700, fontSize:15 }}>{fmt(v.total)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
export default function App() {
  const [tab, setTab] = useState("stock");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    cargarDatos().then(d => { setData(d); setLoading(false); });
  }, []);

  const guardar = (d) => guardarDatos(d);

  if (loading) return (
    <div style={{ background:"#111", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:GOLD, fontFamily:"Georgia,serif", fontSize:20 }}>enkki</div>
    </div>
  );

  const tabs = [
    { id:"stock", icon:"📦", label:"Stock" },
    { id:"vender", icon:"🛒", label:"Vender" },
    { id:"costos", icon:"💲", label:"Costos" },
    { id:"historial", icon:"📋", label:"Historial" },
  ];

  return (
    <div style={{ background:"#111", minHeight:"100vh", color:"#f0e0c0", fontFamily:"system-ui,sans-serif", maxWidth:600, margin:"0 auto", paddingBottom:75 }}>
      {/* Header */}
      <div style={{ padding:"20px 18px 14px", borderBottom:"1px solid #1e1e1e", display:"flex", alignItems:"baseline", gap:10 }}>
        <span style={{ fontFamily:"Georgia,serif", fontSize:24, fontWeight:700, color:GOLD }}>enkki</span>
        <span style={{ color:"#333", fontSize:11, letterSpacing:2 }}>GESTIÓN</span>
      </div>

      {/* Contenido */}
      <div style={{ padding:"18px 15px" }}>
        {tab === "stock"    && <TabStock     data={data} setData={setData} guardar={guardar} />}
        {tab === "vender"   && <TabVender    data={data} setData={setData} guardar={guardar} />}
        {tab === "costos"   && <TabCostos    data={data} setData={setData} guardar={guardar} />}
        {tab === "historial"&& <TabHistorial data={data} setData={setData} guardar={guardar} />}
      </div>

      {/* Nav */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:600, background:"#151515", borderTop:"1px solid #1e1e1e", display:"flex", zIndex:100 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, padding:"11px 0 9px", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color: tab===t.id ? GOLD : "#444" }}>
            <span style={{ fontSize:18 }}>{t.icon}</span>
            <span style={{ fontSize:10, fontWeight:600 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
