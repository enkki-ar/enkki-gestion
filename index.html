<meta name="theme-color" content="#c9a84c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#f0e0c0;font-family:system-ui,sans-serif;max-width:600px;margin:0 auto;padding-bottom:80px}
input,button{font-family:inherit;outline:none}
.header{padding:12px 16px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:12px}
.header img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.header h1{font-family:Georgia,serif;font-size:22px;font-weight:700;color:#c9a84c;line-height:1}
.header span{color:#444;font-size:10px;letter-spacing:2px;display:block;margin-top:2px}
.content{padding:16px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#151515;border-top:1px solid #1e1e1e;display:flex;z-index:100}
.nav button{flex:1;padding:11px 0 9px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#444;font-size:10px;font-weight:600}
.nav button.active{color:#c9a84c}
.nav button span.ico{font-size:18px}
.card{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:14px;padding:12px 14px;margin-bottom:8px}
.card.alert{border-color:#c0392b33}
.card.warn{border-color:#c9a84c33}
.search-input{width:100%;background:#242424;border:1px solid #333;border-radius:10px;padding:10px 13px;color:#f0e0c0;font-size:15px;margin-bottom:12px}
.btn-gold{background:#c9a84c;color:#111;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.btn-dark{background:#2a2a2a;color:#888;border:none;border-radius:11px;padding:13px;font-size:14px;cursor:pointer}
.btn-sm{background:#2a2a2a;border:none;border-radius:8px;padding:8px 10px;color:#c9a84c;cursor:pointer;font-size:13px}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end}
.modal{background:#181818;border-radius:18px 18px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:22px 18px 36px}
.modal h3{font-family:Georgia,serif;font-size:17px;color:#f0e0c0;font-weight:700;margin-bottom:18px}
.field-label{color:#666;font-size:11px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px;margin-top:12px}
.cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:5px 13px;border-radius:18px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#222;color:#666}
.cat-btn.active{background:#c9a84c;color:#111}
.total-box{background:linear-gradient(135deg,#2a1c08,#1a1a1a);border:1px solid #c9a84c22;border-radius:14px;padding:14px 18px;margin-bottom:14px}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:9px}
.qty-btn{background:#2a2a2a;border:none;border-radius:7px;width:30px;height:30px;color:#f0e0c0;font-size:18px;cursor:pointer}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:#1c1c1c;border-radius:10px;padding:10px;text-align:center}
.success{background:#1a3a1a;border:1px solid #27ae60;border-radius:10px;padding:11px 14px;margin-bottom:14px;color:#27ae60;font-weight:600;font-size:14px}
</style>
</head>

let state={productos:[],ventas:[],loading:true};
let carrito=[],canal="men",tabActual="stock",catActiva="Pantallas",editando=null,selCosto=null;

async function cargar(){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/enkki_datos?id=eq.main&select=productos,ventas",{headers:H});
    const j=await r.json();
    if(j&&j[0]&&j[0].productos&&j[0].productos.length>0){
      state.productos=j[0].productos.map(p=>({...p,costoFijo:COSTOS_FIJOS[p.id]||p.costoFijo||0}));
      state.ventas=j[0].ventas||[];
      state.loading=false;render();return;
    }
  }catch(e){}
  state.productos=PRODS.map(p=>({...p,costoFijo:COSTOS_FIJOS[p.id]||0,mats:[]}));
  state.ventas=[];state.loading=false;
  await guardar();render();
}

async function guardar(){
  try{
    await fetch(SUPA_URL+"/rest/v1/enkki_datos?id=eq.main",{method:"PATCH",headers:H,body:JSON.stringify({productos:state.productos,ventas:state.ventas,updated_at:new Date().toISOString()})});
    const chk=await fetch(SUPA_URL+"/rest/v1/enkki_datos?id=eq.main&select=id",{headers:H});
    const rows=await chk.json();
    if(!rows||rows.length===0)await fetch(SUPA_URL+"/rest/v1/enkki_datos",{method:"POST",headers:{...H,"Prefer":"return=minimal"},body:JSON.stringify({id:"main",productos:state.productos,ventas:state.ventas})});
  }catch(e){}
}

function render(){
  const c=document.getElementById("content");
  if(state.loading){c.innerHTML='<div style="text-align:center;padding:60px;color:#c9a84c;font-family:Georgia,serif;font-size:20px">Cargando...</div>';return;}
  if(tabActual==="stock"){c.innerHTML=renderStock();renderListaStock();}
  else if(tabActual==="vender"){c.innerHTML=renderVender();renderCarrito();}
  else if(tabActual==="costos"){c.innerHTML=renderCostos();if(!selCosto)renderListaCostos();}
  else c.innerHTML=renderHistorial();
}

    <div style="background:#1a1a1a;border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#666;font-size:13px">Costo</span><span style="color:#e74c3c;font-weight:600">${fmt(costo)}</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#666;font-size:13px">Ganancia (${mo}%)</span><span style="color:#27ae60;font-weight:600">${fmt(ganancia)}</span></div>
      <div style="border-top:1px solid #2a2a2a;margin-top:6px;padding-top:8px;display:flex;justify-content:space-between">
        <span style="color:#f0e0c0;font-size:14px;font-weight:700">Precio sugerido</span>
        <span style="color:#c9a84c;font-size:18px;font-weight:700;font-family:Georgia,serif">${fmt(pSug)}</span>
      </div>
    </div>
    <button onclick="aplicarPrecio('${p.id}',${pSug})" id="btn-aplicar" style="width:100%;background:#c9a84c;color:#111;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">Aplicar como precio minorista</button>
  </div>`:""}
  <div style="color:#555;font-size:11px;letter-spacing:1px;margin-bottom:8px">MATERIALES EXTRA</div>
  ${!(p.mats||[]).length?'<div style="color:#444;font-size:13px;text-align:center;padding:16px">Sin materiales extra</div>':""}
  ${(p.mats||[]).map(m=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
    <div><div style="color:#f0e0c0;font-size:13px;font-weight:600">${m.nombre}</div><div style="color:#555;font-size:11px">${m.qty} ${m.unidad} × ${fmt(m.costo)}</div></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="color:#c9a84c;font-weight:700">${fmt(m.qty*m.costo)}</span>
    <button onclick="eliminarMat('${p.id}',${m.id})" style="background:#2a2a2a;border:none;border-radius:6px;padding:5px 8px;color:#e74c3c;cursor:pointer">✕</button></div>
  </div>`).join("")}
  <div class="card" style="border-color:#c9a84c22;margin-top:14px">
    <div style="color:#666;font-size:11px;letter-spacing:1px;margin-bottom:10px">+ AGREGAR MATERIAL</div>
    <input class="search-input" type="text" id="m_nombre" placeholder="Nombre (ej: Chapa 0.8mm)">
    <div class="grid3">
      <input class="search-input" type="number" id="m_qty" placeholder="Cant." style="margin-bottom:0">
      <input class="search-input" type="text" id="m_unidad" placeholder="Unidad" style="margin-bottom:0">
      <input class="search-input" type="number" id="m_costo" placeholder="$ costo" style="margin-bottom:0">
    </div>
    <br>
    <button class="btn-gold" onclick="agregarMat('${p.id}')">Agregar material</button>
  </div>`;
}

function ajustarMargen(id,delta){
  state.productos=state.productos.map(p=>p.id!==id?p:{...p,margenObj:Math.max(1,Math.min(500,(p.margenObj||50)+delta))});
  guardar();render();
}

function aplicarPrecio(id,precio){
  state.productos=state.productos.map(p=>p.id!==id?p:{...p,pMen:precio});
  guardar();
  const btn=document.getElementById("btn-aplicar");
  if(btn){btn.textContent="✓ Precio aplicado";btn.style.background="#27ae60";}
  setTimeout(()=>{const b=document.getElementById("btn-aplicar");if(b){b.textContent="Aplicar como precio minorista";b.style.background="#c9a84c";}},2000);
}

function agregarMat(id){
  const nombre=document.getElementById("m_nombre").value;
  const qty=+document.getElementById("m_qty").value||1;
  const unidad=document.getElementById("m_unidad").value;
  const costo=+document.getElementById("m_costo").value;
  if(!nombre||!costo)return;
  state.productos=state.productos.map(p=>p.id!==id?p:{...p,mats:[...(p.mats||[]),{id:Date.now(),nombre,qty,unidad,costo}]});
  guardar();render();
}

function eliminarMat(id,mid){
  state.productos=state.productos.map(p=>p.id!==id?p:{...p,mats:(p.mats||[]).filter(m=>m.id!==mid)});
  guardar();render();
}

function renderHistorial(){
  if(!state.ventas.length)return'<div style="text-align:center;color:#444;padding:60px 0;font-size:14px">Sin ventas registradas todavía.</div>';
  const total=state.ventas.reduce((s,v)=>s+v.total,0);
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <div class="stat-box"><div style="color:#c9a84c;font-size:19px;font-weight:700;font-family:Georgia,serif">${fmt(total)}</div><div style="color:#555;font-size:10px;margin-top:2px">TOTAL FACTURADO</div></div>
    <div class="stat-box"><div style="color:#f0e0c0;font-size:19px;font-weight:700;font-family:Georgia,serif">${state.ventas.length}</div><div style="color:#555;font-size:10px;margin-top:2px">VENTAS</div></div>
  </div>
  ${state.ventas.map(v=>`<div class="card" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <span style="color:#f0e0c0;font-size:13px;font-weight:600">${v.fecha}</span>
        <span style="color:#555;font-size:12px;margin-left:7px">${v.hora}</span>
        <span class="tag" style="background:${v.canal==="men"?"#c9a84c22":"#3498db22"};color:${v.canal==="men"?"#c9a84c":"#3498db"};margin-left:7px">${v.canal==="men"?"Minorista":"Mayorista"}</span>
      </div>
      <button onclick="eliminarVenta(${v.id})" style="background:#2a2a2a;border:none;border-radius:6px;padding:4px 8px;color:#555;cursor:pointer">✕</button>
    </div>
    ${v.items.map(it=>`<div style="display:flex;justify-content:space-between;color:#777;font-size:12px;margin-bottom:3px"><span>${it.qty}× ${it.nombre}</span><span>${fmt(it.precio*it.qty)}</span></div>`).join("")}
    <div style="border-top:1px solid #2a2a2a;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between">
      <span style="color:#666;font-size:13px">Total</span>
      <span style="color:#c9a84c;font-weight:700;font-size:15px">${fmt(v.total)}</span>
    </div>
  </div>`).join("")}`;
}

function eliminarVenta(id){
  state.ventas=state.ventas.filter(v=>v.id!==id);
  guardar();render();
}

function showTab(tab){
  tabActual=tab;selCosto=null;
  document.querySelectorAll(".nav button").forEach((b,i)=>{
    b.className=(["stock","vender","costos","historial"][i]===tab)?"active":"";
  });
  render();
}

cargar();
</script>
</body>
</html>
